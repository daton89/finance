[project]
name = "finance-optimizer"
version = "0.1.0"
description = "MTD-based portfolio optimization (assortativity + Markowitz)"
requires-python = ">=3.12"
dependencies = [
    "networkx>=3.6",
    "numpy>=1.26",
    "pandas>=2",
    "pyportfolioopt>=1.6",
    "scipy>=1.13",
]

[project.optional-dependencies]
yfinance = ["yfinance>=1.5"]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = ["pytest>=8"]
