[project]
name = "finance-portfolio"
version = "0.1.0"
description = "Portfolio positions, P&L, trade journal"
requires-python = ">=3.12"
dependencies = [
    "finance-core",
    "httpx>=0.28",
    "pandas>=2",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = ["pytest>=8"]
