[project]
name = "finance-indicators"
version = "0.1.0"
description = "Pure-Python technical indicator calculations (no DB dependency)"
requires-python = ">=3.12"

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = ["pytest>=8"]
