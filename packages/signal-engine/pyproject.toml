[project]
name = "finance-signal-engine"
version = "0.1.0"
description = "Signal generation engine (technical + AI signals)"
requires-python = ">=3.12"
dependencies = [
    "finance-core",
    "finance-indicators",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = ["pytest>=8"]
