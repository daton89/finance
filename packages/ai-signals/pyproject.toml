[project]
name = "finance-ai-signals"
version = "0.1.0"
description = "AI/LLM signal adapter — calls Stock Signal Worker and persists StockAnalysis records"
requires-python = ">=3.12"
dependencies = [
    "finance-core",
    "httpx>=0.28",
]

[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = ["pytest>=8", "pytest-asyncio"]
